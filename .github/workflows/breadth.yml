name: BIST Breadth Tracker

on:
  schedule:
    - cron: "*/15 7-15 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-breadth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pytz pandas

      - name: Fetch breadth data
        run: python scripts/fetch_breadth.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "Breadth update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
