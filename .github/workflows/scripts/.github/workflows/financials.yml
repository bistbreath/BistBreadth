name: BIST Financials Fetcher

on:
  schedule:
    - cron: "0 5 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-financials:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch financial statements
        run: python scripts/fetch_financials.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/financials
          git diff --staged --quiet || git commit -m "Financials update $(date -u '+%Y-%m-%d')"
          git push
