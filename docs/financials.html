<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIST Özet Finansallar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d0f13;
    --card: #14171d;
    --border: #232833;
    --text: #e8e9ec;
    --muted: #8b90a0;
    --green: #34d17f;
    --red: #ef5f5f;
    --accent: #4d9de0;
    --row-alt: #10131a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
  }
  .topbar { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
  h1 { font-size: 20px; margin: 0; }
  .nav a { color: var(--accent); text-decoration: none; font-size: 13px; }
  .search-wrap { position: relative; margin: 16px 0 24px; max-width: 340px; }
  #search {
    width: 100%; padding: 11px 14px; font-size: 15px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); text-transform: uppercase;
  }
  #search:focus { outline: none; border-color: var(--accent); }
  .suggestions {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 10;
    background: var(--card); border: 1px solid var(--border); border-top: none;
    border-radius: 0 0 8px 8px; max-height: 260px; overflow-y: auto;
  }
  .suggestions div { padding: 9px 14px; cursor: pointer; font-size: 14px; }
  .suggestions div:hover, .suggestions div.active { background: #1d2230; }
  .updated { color: var(--muted); font-size: 12px; margin-bottom: 18px; }
  .tables { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 22px; }
  @media (max-width: 900px) { .tables { grid-template-columns: 1fr; } }
  .panel {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; overflow-x: auto;
  }
  .panel h2 { font-size: 15px; margin: 0 0 14px; }
  .panel h2 span { color: var(--muted); font-size: 11px; font-weight: 400; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; }
  th, td { padding: 8px 10px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  thead th { color: var(--muted); font-weight: 500; font-size: 11px; border-bottom: 1px solid var(--border); }
  tbody tr:nth-child(even) { background: var(--row-alt); }
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .charts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
  @media (max-width: 900px) { .charts { grid-template-columns: 1fr; } }
  .chart-panel { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .chart-panel h3 { font-size: 14px; margin: 0 0 12px; }
  canvas { max-height: 240px; }
  .placeholder { color: var(--muted); padding: 50px 0; text-align: center; }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Özet Finansallar</h1>
  <span class="nav"><a href="index.html">← Market Breadth</a></span>
</div>

<div class="search-wrap">
  <input id="search" placeholder="Hisse kodu yaz (örn. THYAO)" autocomplete="off">
  <div class="suggestions hidden" id="suggestions"></div>
</div>

<div id="content" class="hidden">
  <div class="updated" id="updated"></div>

  <div class="tables">
    <div class="panel">
      <h2>Özet Gelir Tablosu <span>Bin TRY · yıllık büyüme (YoY)</span></h2>
      <table id="incomeTable"></table>
    </div>
    <div class="panel">
      <h2>Özet Bilanço <span>Bin TRY · yıllık büyüme (YoY)</span></h2>
      <table id="balanceTable"></table>
    </div>
  </div>

  <div class="charts">
    <div class="chart-panel"><h3>Çeyreklik Satışlar</h3><canvas id="salesChart"></canvas></div>
    <div class="chart-panel"><h3>Çeyreklik FAVÖK</h3><canvas id="favokChart"></canvas></div>
    <div class="chart-panel"><h3>Çeyreklik Net Kar</h3><canvas id="netChart"></canvas></div>
  </div>
</div>

<div id="placeholder" class="placeholder">Bir hisse kodu arayın.</div>

<script>
let INDEX = [];
let charts = {};
let activeIdx = -1;

const fmt = (v) => {
  if (v === null || v === undefined) return "-";
  return Math.round(v).toLocaleString("tr-TR");
};
const pct = (cur, prev) => {
  if (cur === null || prev === null || prev === 0) return null;
  return (cur - prev) / Math.abs(prev) * 100;
};
const pctCell = (p) => {
  if (p === null) return '<td class="muted">-</td>';
  const cls = p >= 0 ? "pos" : "neg";
  return `<td class="${cls}">% ${p >= 0 ? "" : "-"}${Math.abs(Math.round(p))}</td>`;
};

async function loadIndex() {
  try {
    const res = await fetch('financials/_index.json?_=' + Date.now());
    INDEX = await res.json();
  } catch (e) {
    INDEX = [];
  }
}

const searchEl = document.getElementById('search');
const sugEl = document.getElementById('suggestions');

searchEl.addEventListener('input', () => {
  const q = searchEl.value.trim().toUpperCase();
  activeIdx = -1;
  if (!q) { sugEl.classList.add('hidden'); return; }
  const matches = INDEX.filter(c => c.startsWith(q)).slice(0, 12);
  if (matches.length === 0) { sugEl.classList.add('hidden'); return; }
  sugEl.innerHTML = matches.map(c => `<div>${c}</div>`).join('');
  sugEl.querySelectorAll('div').forEach(d => {
    d.addEventListener('click', () => selectCode(d.textContent));
  });
  sugEl.classList.remove('hidden');
});

searchEl.addEventListener('keydown', (e) => {
  const items = sugEl.querySelectorAll('div');
  if (e.key === 'ArrowDown') { activeIdx = Math.min(activeIdx + 1, items.length - 1); updateActive(items); e.preventDefault(); }
  else if (e.key === 'ArrowUp') { activeIdx = Math.max(activeIdx - 1, 0); updateActive(items); e.preventDefault(); }
  else if (e.key === 'Enter') {
    if (activeIdx >= 0 && items[activeIdx]) selectCode(items[activeIdx].textContent);
    else if (INDEX.includes(searchEl.value.trim().toUpperCase())) selectCode(searchEl.value.trim().toUpperCase());
  }
});
function updateActive(items) {
  items.forEach((it, i) => it.classList.toggle('active', i === activeIdx));
}

function selectCode(code) {
  searchEl.value = code;
  sugEl.classList.add('hidden');
  loadCompany(code);
}

async function loadCompany(code) {
  try {
    const res = await fetch('financials/' + code + '.json?_=' + Date.now());
    if (!res.ok) throw new Error();
    const data = await res.json();
    render(data);
  } catch (e) {
    document.getElementById('content').classList.add('hidden');
    document.getElementById('placeholder').classList.remove('hidden');
    document.getElementById('placeholder').textContent = code + ' için veri bulunamadı.';
  }
}

function render(data) {
  document.getElementById('placeholder').classList.add('hidden');
  document.getElementById('content').classList.remove('hidden');
  document.getElementById('updated').textContent =
    `${data.code} · Son güncelleme: ${data.updated}`;

  const q = data.quarters; // [0] en yeni
  const last5 = q.slice(0, 5);

  // YoY: her ceyregi 4 sonraki (bir yil onceki ayni ceyrek) ile karsilastir
  const yoy = (idx, field) => {
    const cur = q[idx] ? q[idx][field] : null;
    const prev = q[idx + 4] ? q[idx + 4][field] : null;
    return pct(cur, prev);
  };

  // ---- Gelir Tablosu ----
  const incomeRows = [
    ["Satışlar", "satislar", false],
    ["Esas Faaliyet Karı", "esas_faaliyet_kari", false],
    ["FAVÖK", "favok", false],
    ["Net Kar", "net_kar", false],
    ["Brüt Kar Marjı", "brut_marj", true],
    ["FAVÖK Marjı", "favok_marj", true],
    ["Net Kar Marjı", "net_marj", true],
    ["ROE (TTM)", "roe", true],
    ["ROIC (TTM)", "roic", true],
  ];
  buildTable("incomeTable", last5, incomeRows, q);

  // ---- Bilanço ----
  const balanceRows = [
    ["Dönen Varlıklar", "donen_varliklar", false],
    ["Duran Varlıklar", "duran_varliklar", false],
    ["Nakit + Fin. Yatırım", "nakit_finansal_yatirim", false],
    ["Finansal Borçlar (KV)", "finansal_borclar_kv", false],
    ["Özkaynaklar", "ozkaynaklar", false],
  ];
  buildTable("balanceTable", last5, balanceRows, q);

  // ---- Grafikler (son 10 ceyrek, eskiden yeniye) ----
  const chartQuarters = q.slice(0, 10).reverse();
  const labels = chartQuarters.map(x => x.period);
  // YoY icin: her ceyregin degeri ile 4 ceyrek oncekinin (bir yil onceki ayni ceyrek) degeri
  const yoySeries = (field) => chartQuarters.map((x, idx) => {
    // chartQuarters eskiden yeniye sirali; 4 geri = bir yil once
    const prev = chartQuarters[idx - 4];
    if (!prev) return null;
    return pct(x[field], prev[field]);
  });
  drawBar("salesChart", "sales", labels, chartQuarters.map(x => x.satislar), "#4d9de0", yoySeries("satislar"));
  drawBar("favokChart", "favok", labels, chartQuarters.map(x => x.favok), "#34d17f", yoySeries("favok"));
  drawBar("netChart", "net", labels, chartQuarters.map(x => x.net_kar), "#e0a94d", yoySeries("net_kar"));
}

function buildTable(id, last5, rows, allQ) {
  const isMargin = (key) => key.endsWith("_marj");
  let head = "<thead><tr><th></th>";
  last5.forEach(x => head += `<th>${x.period}</th>`);
  head += "<th>YoY</th></tr></thead>";

  let body = "<tbody>";
  rows.forEach(([label, key]) => {
    body += `<tr><td>${label}</td>`;
    last5.forEach(x => {
      const v = x[key];
      if (isMargin(key)) {
        body += `<td>${v === null || v === undefined ? "-" : "% " + v}</td>`;
      } else {
        body += `<td>${fmt(v)}</td>`;
      }
    });
    // YoY: en yeni ceyrek (index 0) vs bir yil oncesi (index 4)
    const cur = allQ[0] ? allQ[0][key] : null;
    const prev = allQ[4] ? allQ[4][key] : null;
    if (isMargin(key)) {
      // marjda YoY = puan farki
      if (cur === null || prev === null) body += '<td>-</td>';
      else {
        const diff = Math.round((cur - prev) * 10) / 10;
        const cls = diff >= 0 ? "pos" : "neg";
        body += `<td class="${cls}">${diff >= 0 ? "+" : ""}${diff} p</td>`;
      }
    } else {
      body += pctCell(pct(cur, prev));
    }
    body += "</tr>";
  });
  body += "</tbody>";
  document.getElementById(id).innerHTML = head + body;
}

function drawBar(canvasId, key, labels, values, color, yoy) {
  if (charts[key]) charts[key].destroy();
  charts[key] = new Chart(document.getElementById(canvasId), {
    type: 'bar',
    data: { labels, datasets: [{ data: values, backgroundColor: color, borderRadius: 3 }] },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              const val = ctx.parsed.y;
              const lines = [Math.round(val).toLocaleString("tr-TR") + " bin TRY"];
              if (yoy && yoy[ctx.dataIndex] !== null && yoy[ctx.dataIndex] !== undefined) {
                const p = yoy[ctx.dataIndex];
                const sign = p >= 0 ? "▲ +" : "▼ ";
                lines.push("YoY: " + sign + Math.round(p) + "%");
              }
              return lines;
            },
            labelTextColor: function(ctx) {
              if (yoy && yoy[ctx.dataIndex] !== null && yoy[ctx.dataIndex] !== undefined) {
                return yoy[ctx.dataIndex] >= 0 ? "#34d17f" : "#ef5f5f";
              }
              return "#e8e9ec";
            }
          }
        }
      },
      scales: {
        x: { ticks: { color: '#8b90a0', font: { size: 9 }, maxRotation: 60, minRotation: 60 }, grid: { display: false } },
        y: { ticks: { color: '#8b90a0', font: { size: 10 } }, grid: { color: '#232833' } }
      }
    }
  });
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-wrap')) sugEl.classList.add('hidden');
});

loadIndex();
</script>

</body>
</html>
